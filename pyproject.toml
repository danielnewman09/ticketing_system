[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ticketing-system"
version = "0.1.0"
description = "Django-based ticket management with requirements traceability and semantic search"
requires-python = ">=3.12"
dependencies = [
    "django>=5.0",
    "sqlite-vec>=0.1.6",
    "sentence-transformers>=3.0",
    "anthropic>=0.84",
    "mcp[cli]>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.5",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
testpaths = ["tickets/tests"]
