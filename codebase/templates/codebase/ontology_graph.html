{% extends "base.html" %}
{% block title %}Ontology Graph{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Ontology Graph</h1>
    <div>
        <a href="{% url 'ontology_node_list' %}" class="btn btn-outline-secondary">Node List</a>
        <a href="{% url 'ontology_node_create' %}" class="btn btn-success">+ Node</a>
        <a href="{% url 'ontology_edge_create' %}" class="btn btn-primary">+ Relationship</a>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div id="graph-container" style="width:100%; height:600px; overflow:hidden;"></div>
    </div>
</div>

<div class="row mt-3">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Legend</div>
            <div class="card-body">
                <div id="legend"></div>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">Node Details</div>
            <div class="card-body">
                <div id="node-details"><span class="text-muted">Click a node to see details.</span></div>
            </div>
        </div>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const KIND_COLORS = {
    "class": "#4e79a7",
    "struct": "#59a14f",
    "enum": "#e15759",
    "union": "#f28e2b",
    "namespace": "#76b7b2",
    "interface": "#b07aa1",
    "concept": "#edc948",
    "hlr": "#ff7f0e",
    "llr": "#9467bd",
};

const EDGE_COLORS = {
    "inherits": "#e15759",
    "composes": "#4e79a7",
    "aggregates": "#59a14f",
    "depends_on": "#999",
    "calls": "#f28e2b",
    "implements": "#b07aa1",
    "uses": "#76b7b2",
    "actor": "#ff7f0e",
    "subject": "#9467bd",
};

// Build legend
const legend = d3.select("#legend");
const kindLegend = legend.append("div").attr("class", "mb-2");
kindLegend.append("strong").text("Ontology nodes");
["class","struct","enum","union","namespace","interface","concept"].forEach(kind => {
    const row = kindLegend.append("div").attr("class", "d-flex align-items-center gap-2 ms-2");
    row.append("span").style("display", "inline-block").style("width", "12px").style("height", "12px")
        .style("border-radius", "50%").style("background", KIND_COLORS[kind]);
    row.append("span").text(kind);
});

const reqLegend = legend.append("div").attr("class", "mb-2 mt-2");
reqLegend.append("strong").text("Requirements");
[["hlr", "High-Level Req"], ["llr", "Low-Level Req"]].forEach(([kind, label]) => {
    const row = reqLegend.append("div").attr("class", "d-flex align-items-center gap-2 ms-2");
    row.append("span").style("display", "inline-block").style("width", "14px").style("height", "10px")
        .style("border-radius", "2px").style("background", KIND_COLORS[kind]);
    row.append("span").text(label);
});

const edgeLegend = legend.append("div").attr("class", "mt-2");
edgeLegend.append("strong").text("Relationships");
Object.entries(EDGE_COLORS).forEach(([rel, color]) => {
    const row = edgeLegend.append("div").attr("class", "d-flex align-items-center gap-2 ms-2");
    row.append("span").style("display", "inline-block").style("width", "16px").style("height", "3px")
        .style("background", color);
    row.append("span").text(rel.replace("_", " "));
});

const container = document.getElementById("graph-container");
const width = container.clientWidth;
const height = 600;

const svg = d3.select("#graph-container").append("svg")
    .attr("width", width).attr("height", height);

const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", (event) => {
    g.attr("transform", event.transform);
}));

// Arrow markers
const defs = svg.append("defs");
defs.selectAll("marker")
    .data(Object.keys(EDGE_COLORS))
    .join("marker")
    .attr("id", d => `arrow-${d}`)
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 20).attr("refY", 0)
    .attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-5L10,0L0,5")
    .attr("fill", d => EDGE_COLORS[d] || "#999");

fetch("{% url 'ontology_graph_data' %}")
    .then(r => r.json())
    .then(data => {
        if (data.nodes.length === 0) {
            d3.select("#graph-container svg").append("text")
                .attr("x", width / 2).attr("y", height / 2)
                .attr("text-anchor", "middle")
                .attr("fill", "#999")
                .text("No nodes yet. Add ontology nodes to see the graph.");
            return;
        }

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.edges).id(d => d.id).distance(120))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = g.append("g").selectAll("line")
            .data(data.edges).join("line")
            .attr("stroke", d => EDGE_COLORS[d.relationship] || "#999")
            .attr("stroke-width", 2)
            .attr("stroke-dasharray", d => (d.relationship === "actor" || d.relationship === "subject") ? "6,3" : null)
            .attr("marker-end", d => `url(#arrow-${d.relationship})`);

        const linkLabel = g.append("g").selectAll("text")
            .data(data.edges).join("text")
            .attr("font-size", 10).attr("fill", "#666")
            .attr("text-anchor", "middle")
            .text(d => d.label);

        const node = g.append("g").selectAll("g")
            .data(data.nodes).join("g")
            .call(d3.drag()
                .on("start", (event, d) => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x; d.fy = d.y;
                })
                .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on("end", (event, d) => {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null; d.fy = null;
                })
            );

        // Ontology nodes get circles, requirement nodes get rounded rectangles
        node.each(function(d) {
            const el = d3.select(this);
            if (d.group === "requirement") {
                el.append("rect")
                    .attr("x", -14).attr("y", -9)
                    .attr("width", 28).attr("height", 18)
                    .attr("rx", 4).attr("ry", 4)
                    .attr("fill", KIND_COLORS[d.kind] || "#999")
                    .attr("stroke", "#fff").attr("stroke-width", 2);
            } else {
                el.append("circle")
                    .attr("r", 10)
                    .attr("fill", KIND_COLORS[d.kind] || "#999")
                    .attr("stroke", "#fff").attr("stroke-width", 2);
            }
        });

        node.append("text")
            .attr("dx", 16).attr("dy", 4)
            .attr("font-size", 12).attr("fill", "#333")
            .text(d => d.name);

        node.on("click", (event, d) => {
            const details = document.getElementById("node-details");
            const groupBadge = d.group === "requirement"
                ? `<span class="badge bg-warning text-dark">${d.kind.toUpperCase()}</span>`
                : `<span class="badge bg-secondary">${d.kind}</span>`;
            let html = `<strong>${d.qualified_name || d.name}</strong> ${groupBadge}`;
            if (d.description) html += `<p class="mt-2 mb-1">${d.description}</p>`;
            if (d.compound_refid) html += `<p class="text-muted small mb-0">compound refid: <code>${d.compound_refid}</code></p>`;

            const incoming = data.edges.filter(e => (e.target.id || e.target) === d.id);
            const outgoing = data.edges.filter(e => (e.source.id || e.source) === d.id);

            // Show actor/subject links for ontology nodes (incoming from requirements)
            const actorLinks = incoming.filter(e => e.relationship === "actor");
            const subjectLinks = incoming.filter(e => e.relationship === "subject");
            if (actorLinks.length) {
                html += `<p class="mt-2 mb-0"><strong>Actor in:</strong></p><ul class="mb-0">`;
                actorLinks.forEach(e => {
                    const s = data.nodes.find(n => n.id === (e.source.id || e.source));
                    html += `<li>${s ? s.name : '?'} <span class="text-muted">(${e.label})</span></li>`;
                });
                html += `</ul>`;
            }
            if (subjectLinks.length) {
                html += `<p class="mt-2 mb-0"><strong>Subject in:</strong></p><ul class="mb-0">`;
                subjectLinks.forEach(e => {
                    const s = data.nodes.find(n => n.id === (e.source.id || e.source));
                    html += `<li>${s ? s.name : '?'} <span class="text-muted">(${e.label})</span></li>`;
                });
                html += `</ul>`;
            }

            const otherOut = outgoing.filter(e => e.relationship !== "actor" && e.relationship !== "subject");
            const otherIn = incoming.filter(e => e.relationship !== "actor" && e.relationship !== "subject");

            if (outgoing.filter(e => e.relationship === "actor" || e.relationship === "subject").length) {
                html += `<p class="mt-2 mb-0"><strong>References:</strong></p><ul class="mb-0">`;
                outgoing.filter(e => e.relationship === "actor" || e.relationship === "subject").forEach(e => {
                    const t = data.nodes.find(n => n.id === (e.target.id || e.target));
                    html += `<li>${e.relationship}: ${t ? t.name : '?'}</li>`;
                });
                html += `</ul>`;
            }
            if (otherOut.length) {
                html += `<p class="mt-2 mb-0"><strong>Outgoing:</strong></p><ul class="mb-0">`;
                otherOut.forEach(e => {
                    const t = data.nodes.find(n => n.id === (e.target.id || e.target));
                    html += `<li>${e.label} → ${t ? t.name : '?'}</li>`;
                });
                html += `</ul>`;
            }
            if (otherIn.length) {
                html += `<p class="mt-2 mb-0"><strong>Incoming:</strong></p><ul class="mb-0">`;
                otherIn.forEach(e => {
                    const s = data.nodes.find(n => n.id === (e.source.id || e.source));
                    html += `<li>${s ? s.name : '?'} → ${e.label}</li>`;
                });
                html += `</ul>`;
            }
            details.innerHTML = html;
        });

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            linkLabel.attr("x", d => (d.source.x + d.target.x) / 2)
                .attr("y", d => (d.source.y + d.target.y) / 2);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
    });
</script>
{% endblock %}
