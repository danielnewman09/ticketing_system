{% extends "base.html" %}
{% load static %}
{% block title %}Ontology Graph{% endblock %}
{% block head %}
<script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2/cytoscape-fcose.js"></script>
<script src="https://unpkg.com/cytoscape-expand-collapse@4/cytoscape-expand-collapse.js"></script>
<script src="{% static 'js/cytoscape-config.js' %}"></script>
<script src="{% static 'js/ontology-graph.js' %}"></script>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Ontology Graph</h1>
    <div>
        <a href="{% url 'ontology_node_list' %}" class="btn btn-outline-secondary btn-sm">Node List</a>
        <a href="{% url 'ontology_node_create' %}" class="btn btn-success btn-sm">+ Node</a>
        <a href="{% url 'ontology_triple_create' %}" class="btn btn-primary btn-sm">+ Triple</a>
    </div>
</div>

<div x-data="ontologyGraph('{% url 'ontology_graph_data' %}')">
    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <div>
                    <label class="form-label mb-0 small fw-bold">Search</label>
                    <input type="text" class="form-control form-control-sm" placeholder="Node name..."
                           style="width:160px" x-model="search" @input.debounce.200ms="applyFilters()">
                </div>
                <div>
                    <label class="form-label mb-0 small fw-bold">Node Kind</label>
                    <select class="form-select form-select-sm" style="width:140px"
                            x-model="filterKind" @change="applyFilters()">
                        <option value="all">All kinds</option>
                        <option value="attribute">Attribute</option>
                        <option value="class">Class</option>
                        <option value="constant">Constant</option>
                        <option value="enum">Enum</option>
                        <option value="enum_value">Enum Value</option>
                        <option value="function">Function</option>
                        <option value="interface">Interface</option>
                        <option value="method">Method</option>
                        <option value="module">Module</option>
                        <option value="primitive">Primitive</option>
                        <option value="type_alias">Type Alias</option>
                    </select>
                </div>
                <div>
                    <label class="form-label mb-0 small fw-bold">Layout</label>
                    <select class="form-select form-select-sm" style="width:140px"
                            x-model="layout" @change="changeLayout()">
                        <option value="fcose">Force-directed</option>
                        <option value="cose">Force-directed (classic)</option>
                        <option value="breadthfirst">Hierarchical</option>
                        <option value="circle">Circle</option>
                        <option value="grid">Grid</option>
                        <option value="concentric">Concentric</option>
                    </select>
                </div>
                <div>
                    <label class="form-label mb-0 small fw-bold">Classes</label>
                    <div class="d-flex gap-1">
                        <button class="btn btn-outline-secondary btn-sm" @click="expandAll()" title="Expand all classes">Expand</button>
                        <button class="btn btn-outline-secondary btn-sm" @click="collapseAll()" title="Collapse all classes">Collapse</button>
                        <button class="btn btn-sm" :class="showPrivate ? 'btn-warning' : 'btn-outline-secondary'"
                                @click="togglePrivate()" title="Toggle private members">Private</button>
                    </div>
                </div>
                <div class="ms-auto">
                    <label class="form-label mb-0 small fw-bold">&nbsp;</label>
                    <div>
                        <button class="btn btn-outline-secondary btn-sm" @click="fit()">Fit</button>
                        <button class="btn btn-outline-secondary btn-sm" @click="reset()">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-9">
            <div class="card">
                <div class="card-body p-0">
                    <div x-ref="cy" style="width:100%; height:600px;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card mb-3">
                <div class="card-header py-2 small fw-bold">Node Details</div>
                <div class="card-body">
                    <template x-if="!selectedNode">
                        <span class="text-muted small">Click a node to see details.</span>
                    </template>
                    <template x-if="selectedNode">
                        <div>
                            <strong x-text="selectedNode.qualified_name"></strong>
                            <span class="badge bg-secondary ms-1"
                                  x-text="selectedNode.kind"></span>
                            <template x-if="selectedNode.visibility">
                                <span class="badge ms-1"
                                      :class="{'bg-success': selectedNode.visibility === 'public', 'bg-danger': selectedNode.visibility === 'private', 'bg-warning text-dark': selectedNode.visibility === 'protected'}"
                                      x-text="selectedNode.visibility"></span>
                            </template>
                            <template x-if="selectedNode.memberCount > 0">
                                <span class="badge bg-info ms-1" x-text="selectedNode.memberCount + ' members'"></span>
                            </template>
                            <p class="mt-2 mb-1 small" x-show="selectedNode.description" x-text="selectedNode.description"></p>
                            <p class="text-muted small mb-0" x-show="selectedNode.compound_refid">
                                refid: <code x-text="selectedNode.compound_refid"></code>
                            </p>
                            <a class="btn btn-sm btn-outline-primary mt-2" x-show="selectedNode.url" :href="selectedNode.url">View Details</a>
                            <template x-if="selectedNode.children.length > 0">
                                <div>
                                    <p class="mt-2 mb-0 small"><strong>Children:</strong></p>
                                    <ul class="mb-0 small">
                                        <template x-for="c in selectedNode.children" :key="c.name">
                                            <li>
                                                <a x-show="c.url" :href="c.url" x-text="c.name"></a>
                                                <span x-show="!c.url" x-text="c.name"></span>
                                                <span class="badge bg-light text-dark ms-1" x-text="c.kind"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                            <template x-if="selectedNode.outgoing.length > 0">
                                <div>
                                    <p class="mt-2 mb-0 small"><strong>Outgoing:</strong></p>
                                    <ul class="mb-0 small">
                                        <template x-for="e in selectedNode.outgoing" :key="e.label + e.target">
                                            <li><span x-text="e.label"></span> &rarr; <span x-text="e.target"></span></li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                            <template x-if="selectedNode.incoming.length > 0">
                                <div>
                                    <p class="mt-2 mb-0 small"><strong>Incoming:</strong></p>
                                    <ul class="mb-0 small">
                                        <template x-for="e in selectedNode.incoming" :key="e.label + e.source">
                                            <li><span x-text="e.label"></span> &larr; <span x-text="e.source"></span></li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
            <div class="card">
                <div class="card-header py-2 small fw-bold">Legend</div>
                <div class="card-body py-2" x-ref="legend"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
